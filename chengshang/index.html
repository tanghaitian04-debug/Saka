<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#080808">
  <title>城殇</title>
  <link rel="stylesheet" href="style.css?v=20260711-2">
</head>
<body>
  <main class="game-shell" id="gameShell">
    <div class="scene-bg" aria-hidden="true"></div>

    <section class="screen home-screen active" id="homeScreen">
      <nav class="main-menu" aria-label="主菜单">
        <button class="game-btn primary" data-action="start" aria-label="开始游戏"><span>开始游戏</span></button>
        <button class="game-btn" data-screen="storyScreen" aria-label="故事线"><span>故事线</span></button>
        <button class="game-btn" data-screen="memoryScreen" aria-label="记忆碎片"><span>记忆碎片</span></button>
        <button class="game-btn" data-action="settings" aria-label="游戏设置"><span>游戏设置</span></button>
      </nav>
    </section>

    <section class="screen page-screen" id="storyScreen">
      <div class="page-head">
        <button class="icon-btn back-btn" aria-label="返回主页">‹</button>
        <h2>故 事 线</h2>
        <span></span>
      </div>
      <div class="chapter-list">
        <button class="chapter-card available">
          <span class="chapter-index">第一篇</span>
          <strong>南京篇</strong>
          <small>一九三七 · 可进入</small>
        </button>
        <button class="chapter-card locked" disabled><strong>未解锁故事</strong><small>敬请期待</small></button>
        <button class="chapter-card locked" disabled><strong>未解锁故事</strong><small>敬请期待</small></button>
      </div>
    </section>

    <section class="screen page-screen" id="memoryScreen">
      <div class="page-head">
        <button class="icon-btn back-btn" aria-label="返回主页">‹</button>
        <h2>记 忆 碎 片</h2>
        <span></span>
      </div>
      <div class="memory-grid">
        <article class="memory-card"><div>✉</div><strong>一封旧信</strong><small>尚未解锁</small></article>
        <article class="memory-card"><div>▧</div><strong>褪色照片</strong><small>尚未解锁</small></article>
        <article class="memory-card"><div>◇</div><strong>随身旧物</strong><small>尚未解锁</small></article>
        <article class="memory-card"><div>⌁</div><strong>无名证言</strong><small>尚未解锁</small></article>
      </div>
    </section>

    <div class="modal-layer" id="settingsModal" aria-hidden="true">
      <section class="settings-panel" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
        <h2 id="settingsTitle">游 戏 设 置</h2>
        <div class="setting-row"><span>背景音乐</span><button class="toggle" data-setting="music" aria-pressed="false"><i></i></button></div>
        <div class="setting-row"><span>游戏音效</span><button class="toggle on" data-setting="sfx" aria-pressed="true"><i></i></button></div>
        <div class="setting-row"><span>字幕显示</span><button class="toggle on" data-setting="subtitles" aria-pressed="true"><i></i></button></div>
        <div class="setting-row volume-row"><label for="volume">音量大小</label><input id="volume" type="range" min="0" max="100" value="70"></div>
        <button class="game-btn close-settings"><span>返 回</span></button>
      </section>
    </div>

    <div class="transition" id="transition"><span>故事即将开始……</span></div>
  </main>
  <script src="script.js?v=20260711-2"></script>
</body>
</html>
