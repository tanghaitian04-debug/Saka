<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>五子棋小游戏</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at top, #f7d89d 0%, #c79045 40%, #3b2412 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #2c190b;
    }
    .app {
      width: min(96vw, 760px);
      background: rgba(255, 248, 230, .92);
      border: 1px solid rgba(80, 45, 15, .18);
      border-radius: 24px;
      box-shadow: 0 22px 70px rgba(0,0,0,.28);
      padding: 20px;
    }
    .top {
      display: flex;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    h1 { margin: 0; font-size: 28px; letter-spacing: 1px; }
    .status {
      font-size: 17px;
      font-weight: 700;
      padding: 10px 14px;
      background: #fff3d0;
      border-radius: 999px;
      border: 1px solid rgba(80, 45, 15, .16);
    }
    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    button {
      border: 0;
      border-radius: 12px;
      padding: 11px 16px;
      cursor: pointer;
      font-weight: 700;
      color: white;
      background: #6a3c16;
      box-shadow: 0 4px 10px rgba(0,0,0,.18);
    }
    button:hover { transform: translateY(-1px); }
    button.secondary { background: #9c672a; }
    .board-wrap {
      display: flex;
      justify-content: center;
      overflow: auto;
      padding: 10px;
      background: rgba(86, 45, 12, .18);
      border-radius: 20px;
    }
    canvas {
      width: min(88vw, 660px);
      height: min(88vw, 660px);
      max-width: 660px;
      max-height: 660px;
      background: #d9a65a;
      border-radius: 16px;
      box-shadow: inset 0 0 0 3px rgba(75, 37, 7, .38), 0 10px 30px rgba(0,0,0,.25);
      touch-action: manipulation;
    }
    .tips {
      margin-top: 14px;
      line-height: 1.7;
      font-size: 14px;
      opacity: .85;
    }
    @media (max-width: 520px) {
      body { padding: 10px; }
      .app { padding: 14px; border-radius: 18px; }
      h1 { font-size: 23px; }
      .status { font-size: 15px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="top">
      <h1>五子棋</h1>
      <div id="status" class="status">黑棋先手</div>
    </div>
    <div class="toolbar">
      <button id="restart">重新开始</button>
      <button id="undo" class="secondary">悔棋</button>
    </div>
    <div class="board-wrap">
      <canvas id="board" width="660" height="660" aria-label="五子棋棋盘"></canvas>
    </div>
    <div class="tips">规则：黑白轮流落子，横向、竖向或斜向任意方向先连成五颗即获胜。电脑和手机都可以直接点击/触摸棋盘落子。</div>
  </main>

  <script>
    const canvas = document.getElementById("board");
    const ctx = canvas.getContext("2d");
    const statusEl = document.getElementById("status");
    const restartBtn = document.getElementById("restart");
    const undoBtn = document.getElementById("undo");
    const size = 15;
    const margin = 35;
    const cell = (canvas.width - margin * 2) / (size - 1);
    let board = [];
    let current = 1;
    let gameOver = false;
    let history = [];

    function init() {
      board = Array.from({ length: size }, () => Array(size).fill(0));
      current = 1;
      gameOver = false;
      history = [];
      statusEl.textContent = "黑棋先手";
      draw();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawWood();
      drawGrid();
      drawStars();
      drawPieces();
    }

    function drawWood() {
      const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
      gradient.addColorStop(0, "#efc278");
      gradient.addColorStop(0.55, "#d39a4d");
      gradient.addColorStop(1, "#b67831");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.globalAlpha = 0.12;
      ctx.strokeStyle = "#6a3712";
      for (let i = 0; i < 18; i++) {
        ctx.beginPath();
        const y = 20 + i * 38;
        ctx.moveTo(12, y);
        ctx.bezierCurveTo(190, y - 20, 410, y + 25, 648, y - 8);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }

    function drawGrid() {
      ctx.strokeStyle = "#3c210f";
      ctx.lineWidth = 1.4;
      for (let i = 0; i < size; i++) {
        const p = margin + i * cell;
        ctx.beginPath();
        ctx.moveTo(margin, p);
        ctx.lineTo(canvas.width - margin, p);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(p, margin);
        ctx.lineTo(p, canvas.height - margin);
        ctx.stroke();
      }
    }

    function drawStars() {
      const points = [[3,3], [11,3], [7,7], [3,11], [11,11]];
      ctx.fillStyle = "#3c210f";
      points.forEach(([x, y]) => {
        ctx.beginPath();
        ctx.arc(margin + x * cell, margin + y * cell, 5, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function drawPieces() {
      for (let y = 0; y < size; y++) {
        for (let x = 0; x < size; x++) {
          if (board[y][x]) drawPiece(x, y, board[y][x]);
        }
      }
    }

    function drawPiece(x, y, player) {
      const px = margin + x * cell;
      const py = margin + y * cell;
      const r = cell * 0.42;
      ctx.beginPath();
      ctx.arc(px, py, r, 0, Math.PI * 2);
      const gradient = ctx.createRadialGradient(px - r / 3, py - r / 3, 2, px, py, r);
      if (player === 1) {
        gradient.addColorStop(0, "#5a5a5a");
        gradient.addColorStop(0.55, "#151515");
        gradient.addColorStop(1, "#000");
      } else {
        gradient.addColorStop(0, "#fff");
        gradient.addColorStop(0.65, "#e8e8e8");
        gradient.addColorStop(1, "#bdbdbd");
      }
      ctx.fillStyle = gradient;
      ctx.fill();
      ctx.strokeStyle = player === 1 ? "rgba(0,0,0,.5)" : "rgba(70,70,70,.45)";
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    function getCell(event) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const clientX = event.touches ? event.touches[0].clientX : event.clientX;
      const clientY = event.touches ? event.touches[0].clientY : event.clientY;
      const x = Math.round((clientX - rect.left) * scaleX - margin) / cell;
      const y = Math.round((clientY - rect.top) * scaleY - margin) / cell;
      return { x: Math.round(x), y: Math.round(y) };
    }

    function place(event) {
      if (gameOver) return;
      const { x, y } = getCell(event);
      if (x < 0 || y < 0 || x >= size || y >= size || board[y][x] !== 0) return;
      board[y][x] = current;
      history.push({ x, y, player: current });
      draw();
      if (checkWin(x, y, current)) {
        statusEl.textContent = current === 1 ? "黑棋胜利！" : "白棋胜利！";
        gameOver = true;
        return;
      }
      if (history.length === size * size) {
        statusEl.textContent = "平局";
        gameOver = true;
        return;
      }
      current = current === 1 ? 2 : 1;
      statusEl.textContent = current === 1 ? "轮到黑棋" : "轮到白棋";
    }

    function checkWin(x, y, player) {
      const directions = [[1, 0], [0, 1], [1, 1], [1, -1]];
      return directions.some(([dx, dy]) => {
        let count = 1;
        count += countDirection(x, y, dx, dy, player);
        count += countDirection(x, y, -dx, -dy, player);
        return count >= 5;
      });
    }

    function countDirection(x, y, dx, dy, player) {
      let count = 0;
      let nx = x + dx;
      let ny = y + dy;
      while (nx >= 0 && ny >= 0 && nx < size && ny < size && board[ny][nx] === player) {
        count++;
        nx += dx;
        ny += dy;
      }
      return count;
    }

    function undo() {
      if (!history.length) return;
      const last = history.pop();
      board[last.y][last.x] = 0;
      current = last.player;
      gameOver = false;
      statusEl.textContent = current === 1 ? "轮到黑棋" : "轮到白棋";
      draw();
    }

    canvas.addEventListener("click", place);
    canvas.addEventListener("touchstart", (event) => {
      event.preventDefault();
      place(event);
    }, { passive: false });
    restartBtn.addEventListener("click", init);
    undoBtn.addEventListener("click", undo);
    init();
  </script>
</body>
</html>
