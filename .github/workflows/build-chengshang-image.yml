name: Build Chengshang Image

on:
  push:
    paths:
      - 'chengshang/assets/home-bg/part*.txt'
      - '.github/workflows/build-chengshang-image.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decode image
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p chengshang/assets
          cat chengshang/assets/home-bg/part0.txt \
              chengshang/assets/home-bg/part1.txt \
              chengshang/assets/home-bg/part2.txt \
              chengshang/assets/home-bg/part3.txt \
              chengshang/assets/home-bg/part4.txt \
              chengshang/assets/home-bg/part5.txt \
              chengshang/assets/home-bg/part6.txt \
              chengshang/assets/home-bg/part7.txt \
            | tr -d '\r\n ' \
            | base64 --decode > chengshang/assets/home-menu.jpg
          test -s chengshang/assets/home-menu.jpg
          file chengshang/assets/home-menu.jpg

      - name: Commit image
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add chengshang/assets/home-menu.jpg
          if git diff --cached --quiet; then
            echo 'No changes'
          else
            git commit -m '生成城殇首页图片'
            git push
          fi
