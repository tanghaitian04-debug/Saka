<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>设备图浏览</title>
<style>
body{margin:0;background:#0f172a;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding-bottom:80px}.top{position:sticky;top:0;background:rgba(15,23,42,.96);backdrop-filter:blur(10px);z-index:10;padding:12px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 12px rgba(0,0,0,.3)}.back{border:none;background:#334155;color:#fff;border-radius:8px;padding:10px 12px;font-weight:700}.title{font-size:18px;font-weight:800}.gallery{padding:12px;display:grid;grid-template-columns:1fr;gap:14px}.card{background:#1e293b;border:1px solid #334155;border-radius:14px;overflow:hidden}.card-title{padding:12px;font-weight:700;color:#e2e8f0}.upload-box{padding:16px;display:flex;flex-direction:column;gap:12px}.upload-btn{background:#2563eb;color:#fff;border:none;border-radius:10px;padding:13px;font-weight:800;font-size:16px}.clear-btn{background:#475569;color:#fff;border:none;border-radius:10px;padding:11px;font-weight:700}.hint{color:#94a3b8;font-size:13px;line-height:1.6}.pic{width:100%;display:none;background:#020617}.pic.show{display:block}.viewer{position:fixed;inset:0;background:rgba(0,0,0,.94);display:none;z-index:99;align-items:center;justify-content:center;padding:12px;overflow:auto}.viewer img{max-width:100%;height:auto}.viewer.show{display:flex}.close{position:fixed;right:14px;top:14px;background:#fff;color:#111827;border:none;border-radius:999px;width:38px;height:38px;font-size:22px;font-weight:900}input[type=file]{display:none}
</style>
</head>
<body>
<div class="top"><button class="back" onclick="location.href='index.html'">← 返回</button><div class="title">设备图浏览</div></div>
<div class="gallery">
  <div class="card">
    <div class="card-title">设备图 1</div>
    <img id="devicePic" class="pic" onclick="openViewer(this.src)" alt="设备图1">
    <div class="upload-box">
      <button class="upload-btn" onclick="document.getElementById('fileInput').click()">上传 / 更换设备图</button>
      <button class="clear-btn" onclick="clearImage()">清除本机图片</button>
      <input id="fileInput" type="file" accept="image/*" onchange="loadImage(event)">
      <div class="hint">当前版本支持在手机本机选择设备图，选中后会保存到这个浏览器里，下次打开还在。点击图片可全屏查看。</div>
    </div>
  </div>
</div>
<div id="viewer" class="viewer" onclick="closeViewer()"><button class="close">×</button><img id="viewerImg" src="" alt="预览"></div>
<script>
const key='device-map-1';
const img=document.getElementById('devicePic');
function showImage(src){img.src=src;img.classList.add('show')}
function loadSaved(){const saved=localStorage.getItem(key);if(saved)showImage(saved)}
function loadImage(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=function(){localStorage.setItem(key,reader.result);showImage(reader.result)};reader.readAsDataURL(file)}
function clearImage(){localStorage.removeItem(key);img.removeAttribute('src');img.classList.remove('show')}
function openViewer(src){document.getElementById('viewerImg').src=src;document.getElementById('viewer').classList.add('show')}
function closeViewer(){document.getElementById('viewer').classList.remove('show')}
loadSaved();
</script>
</body>
</html>
